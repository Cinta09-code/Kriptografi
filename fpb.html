<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator FPB Web (PHP)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            background: #ffffff;
            max-width: 480px;
            margin: 0 auto;
            padding: 30px 35px 35px;
            border: 1px solid #ccc;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0 0 24px 0;
            color: #000;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #222;
            margin-top: 14px;
            margin-bottom: 4px;
        }

        input[type="number"] {
            width: 200px;
            padding: 4px 6px;
            border: 1px solid #777;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .btn-hitung {
            display: inline-block;
            margin-top: 20px;
            padding: 5px 16px;
            font-size: 0.9rem;
            border: 1px solid #555;
            background: #e8e8e8;
            cursor: pointer;
        }

        .btn-hitung:hover {
            background: #d0d0d0;
        }

        .hasil-box {
            margin-top: 24px;
            border-left: 4px solid #1a73e8;
            padding: 12px 16px;
            background: #fff;
        }

        .hasil-box p {
            margin: 4px 0;
            font-size: 0.95rem;
            color: #000;
        }

        .prima {
            color: green;
            font-weight: bold;
        }

        .tidak-prima {
            color: red;
            font-weight: bold;
        }

        .riwayat-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #1a73e8;
            text-decoration: none;
        }

        .riwayat-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Kalkulator FPB Euclidean</h1>

        <form action="fpb.php" method="POST">
            <label for="a">Angka 1 (Nilai A):</label>
            <input type="number" id="a" name="a" min="1" required>

            <label for="b">Angka 2 (Nilai B):</label>
            <input type="number" id="b" name="b" min="1" required>

            <br>
            <button type="submit" class="btn-hitung">Hitung FPB</button>
        </form>

        <a class="riwayat-link" href="riwayat.php">Lihat Riwayat Perhitungan</a>
    </div>
</body>

</html>
